spring.application.name=car-rental-system

# ---- Server ----
# Railway/most PaaS inject a dynamic PORT; fall back to 8080 locally.
server.port=${PORT:8080}

# ---- Database (PostgreSQL) ----
# All values are overridable via environment variables (see .env.example).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_rental_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Wait/retry-friendly connection settings for containerised MySQL
spring.datasource.hikari.initialization-fail-timeout=60000

# ---- Logging ----
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.springframework.security.web=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.example.carrentalsystem=${LOG_LEVEL_APP:INFO}

# ---- JWT ----
# Base64-encoded HMAC secret. Override JWT_SECRET in every real environment.
jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS0xMjM0NTY3ODkwMTI=}

# ---- Razorpay (test keys by default; override with live keys via env) ----
razorpay.key=${RAZORPAY_KEY:rzp_test_OVYMnXur6tEFGV}
razorpay.secret=${RAZORPAY_SECRET:3MqqRw03bNl2bkDRXyK75mT8}

# ---- Hibernate Dialect ----
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
