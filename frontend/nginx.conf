# Rendered by the nginx:alpine entrypoint (envsubst) at container start.
# Only ${BACKEND_ORIGIN} is substituted; nginx runtime vars like $uri are safe.
server {
    # ${PORT} defaults to 80 (set in the Dockerfile) and is overridden by
    # hosts like Railway that inject their own PORT.
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reasonable upload size for base64 car images sent to the API.
    client_max_body_size 20m;

    # Reverse-proxy API calls to the Spring Boot backend.
    # Using a variable + resolver means nginx resolves the host lazily at
    # request time, so the container still starts even if the backend host
    # is not reachable (e.g. when the frontend is deployed standalone and the
    # app talks to the backend directly via a baked-in API_URL instead).
    location /api/ {
        set $backend "${BACKEND_ORIGIN}";
        resolver 127.0.0.11 valid=10s ipv6=off;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Angular single-page-app routing: always fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built static assets aggressively (they are content-hashed).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
