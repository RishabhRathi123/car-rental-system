spring.application.name=car-rental-system

# ---- Server ----
# Railway/most PaaS inject a dynamic PORT; fall back to 8080 locally.
server.port=${PORT:8080}

# ---- Database (PostgreSQL) ----
# All values are overridable via environment variables (see .env.example).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_rental_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# ---- Connection pool (HikariCP) tuned for Neon / serverless Postgres ----
# Neon auto-suspends its compute when idle and resumes (~1s) on the next
# connection. minimum-idle=0 lets the pool drop to zero idle connections so a
# request after an idle period opens a FRESH connection (which resumes Neon)
# instead of handing out a dead one. A generous connection-timeout gives Neon
# time to wake, and a short max-lifetime prevents stale connections lingering.
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# ---- Logging ----
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.springframework.security.web=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.example.carrentalsystem=${LOG_LEVEL_APP:INFO}

# ---- JWT ----
# Base64-encoded HMAC secret. Override JWT_SECRET in every real environment.
jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS0xMjM0NTY3ODkwMTI=}

